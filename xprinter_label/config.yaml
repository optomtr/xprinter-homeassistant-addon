name: Xprinter Label
version: "1.1.0"
slug: xprinter_label
description: Print 30x20 mm QR labels on an Xprinter XP-365B over USB
arch:
  - aarch64
startup: application
boot: auto
init: false
usb: true
udev: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: HTTP printing API
options:
  api_key: ""
  label_height_mm: 20.0
  gap_mm: 2.0
  image_offset_dots: 0
schema:
  api_key: str
  label_height_mm: "float(15,25)"
  gap_mm: "float(0,10)"
  image_offset_dots: "int(-40,40)"
