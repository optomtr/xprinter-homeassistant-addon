configuration:
  api_key:
    name: API-ключ
    description: Необязательный ключ для заголовка X-API-Key.
  default_profile:
    name: Профиль бумаги по умолчанию
    description: Профиль, который используется, если запрос не передал profile.
  label_height_mm:
    name: Высота маленькой этикетки
    description: Длина маленькой этикетки 30x20 по направлению подачи бумаги, в миллиметрах.
  gap_mm:
    name: Зазор маленьких этикеток
    description: Фактический промежуток между соседними маленькими этикетками, в миллиметрах.
  image_offset_dots:
    name: Смещение маленького макета
    description: Плюс сдвигает маленький макет вниз, минус сдвигает его вверх.
  small_density:
    name: Плотность маленькой печати
    description: Нагрев для маленьких этикеток, от 0 до 15.
  small_speed:
    name: Скорость маленькой печати
    description: Скорость печати маленьких этикеток. Чем меньше значение, тем темнее и медленнее печать.
  large_label_height_mm:
    name: Высота большой этикетки
    description: Длина большой этикетки по направлению подачи бумаги, в миллиметрах.
  large_gap_mm:
    name: Зазор больших этикеток
    description: Фактический промежуток между соседними большими этикетками, в миллиметрах.
  large_margin_mm:
    name: Отступ большой этикетки
    description: Белый отступ вокруг текста и загруженных файлов на большой этикетке, в миллиметрах.
  large_image_offset_dots:
    name: Смещение большого макета
    description: Плюс сдвигает большой макет вниз, минус сдвигает его вверх.
  large_density:
    name: Плотность большой печати
    description: Нагрев для больших этикеток, от 0 до 15.
  large_speed:
    name: Скорость большой печати
    description: Скорость печати больших этикеток. Чем меньше значение, тем лучше пропечатываются сплошные чёрные области.
network:
  8099/tcp: HTTP API печати
